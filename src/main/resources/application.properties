server.port=8080

# ===========================
# --- DATABASE ---
# ===========================
spring.datasource.url=jdbc:postgresql://localhost:5432/redkango
spring.datasource.username=postgres
spring.datasource.password=Postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# --- LOGGING ---
# ===========================
logging.level.org.springframework.security=DEBUG

# ===========================
# --- MAIL ---
# ===========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rasanjaleea36@gmail.com
spring.mail.password=wkvt xphj nqgr lfit
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===========================
# --- JWT ---
# ===========================
app.jwt.secret=change-this-super-secret-change-me-please-32bytes-min
app.jwt.accessTokenTtlMinutes=15
app.jwt.refreshTokenTtlDays=30
app.jwt.refreshTokenTtlDaysRememberMe=90

# ===========================
# --- PASSWORD POLICY ---
# ===========================
app.password.minLength=8
app.password.minUppercase=1
app.password.minLowercase=1
app.password.minDigits=1
app.password.minSpecial=1

# ===========================
# --- VERIFICATION TOKEN ---
# ===========================
app.verification.ttlMinutes=60

# ===========================
# --- PASSWORD RESET TOKEN ---
# ===========================
app.reset.ttlMinutes=30

# ===========================
# --- URLS ---
# ===========================
app.frontendBaseUrl=http://localhost:4200
app.backendBaseUrl=http://localhost:8080

# ===========================
# --- EMAIL LINK STRATEGY ---
# ===========================
# TRUE  ? email links point directly to Angular (http://localhost:4200/reset-password?token=xxx)
#          Angular reads the token and submits the form. Simplest, no backend redirect needed.
# FALSE ? email links point to backend GET endpoints which redirect to Angular.
#          Requires the GET /api/auth/reset-password and GET /api/auth/verify endpoints
#          from the updated AuthController.java.
#
# Set to TRUE ? this is the fix for the "An unexpected error" JSON response
# that appeared when clicking the reset link in the email.
app.emailLinks.frontendEnabled=true

# ===========================
# --- CORS ---
# ===========================
app.cors.allowedOrigins=http://localhost:4200